# Mosquitto broker configuration for the Teton backend.
# QoS 1 delivery with persistent sessions is handled per-client; the broker
# just needs an open listener and on-disk persistence for durability.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

# Keep retained/queued messages for offline (persistent-session) clients so a
# subscriber that reconnects after a restart still receives QoS 1 messages.
max_queued_messages 1000000
persistent_client_expiration 1h

# QoS-1 backpressure window. 
max_inflight_messages 2000

log_dest stdout
log_type warning
log_type notice
log_type information
